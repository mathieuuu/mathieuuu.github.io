<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>A la Une</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="alaune-412.png" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css"/>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
  <script>
    function getDateString() {
        var date = new Date();
        
        var year = date.getFullYear().toString();
        var monthInt = date.getMonth() + 1;
        var dayInt = date.getDate();
        var month = (monthInt < 10) ? ("0"+monthInt) : monthInt.toString();
        var day = (dayInt < 10) ? ("0"+dayInt) : dayInt.toString();

        return year + "/" + month + "/" + day;
    }

    $(document).ready(function(){
      var papers = [ "l_equip", "parisien", "liberation", "lefigaro", "lemonde", "echos"];
      var dateString = getDateString();
      var $carousel = $(".owl-carousel");
      var total = papers.length;
      var count = 0;
      var validImages = [];

      // Clear carousel initially to avoid showing old/fallback images while testing
      $carousel.empty();

      function checkImage(p, index) {
        var url = "http://img.kiosko.net/" + dateString + "/fr/" + p + ".750.jpg";
        var img = new Image();
        img.onload = function() {
          validImages[index] = url;
          next();
        };
        img.onerror = function() {
          console.log("Failed to load: " + url);
          validImages[index] = null;
          next();
        };
        img.src = url;
      }

      function resetZoom() {
        $carousel.removeClass("is-zoomed");
        $carousel.find("img[data-zoomed='true']").attr({
          "data-zoomed": "false",
          "data-tx": "0",
          "data-ty": "0",
          "data-tx-live": "0",
          "data-ty-live": "0"
        }).css({
          "transform-origin": "center center",
          "transform": ""
        });
        $carousel.find("img.zoomed").removeClass("zoomed");

        var owl = $carousel.data('owl.carousel');
        if (owl && owl.settings) {
          owl.settings.touchDrag = true;
          owl.settings.mouseDrag = true;
          owl.settings.pullDrag = true;
        }
      }

      function toggleImageZoom(img, clientX, clientY) {
        var $img = $(img);
        var isZoomed = $img.attr("data-zoomed") === "true";

        if (isZoomed) {
          resetZoom();
          return;
        }

        resetZoom();
        $carousel.addClass("is-zoomed");

        var rect = img.getBoundingClientRect();
        // Calculate the exact scale needed so that the image fits the screen completely (img full screen)
        var scaleH = window.innerHeight / rect.height;
        var scaleW = window.innerWidth / rect.width;
        var scale = Math.max(scaleH, scaleW);

        // Fallback in case the image perfectly fits the screen or is larger
        if (Math.abs(scale - 1) < 0.1) {
          scale = 2; // Default zoom if already "full screen"
        }

        if (clientX !== null && clientY !== null) {
          var x = ((clientX - rect.left) / rect.width) * 100;
          var y = ((clientY - rect.top) / rect.height) * 100;
          img.style.transformOrigin = x + "% " + y + "%";
        } else {
          img.style.transformOrigin = "center center";
        }

        img.style.transform = "scale(" + scale + ")";
        $img.attr("data-zoomed", "true");
        $img.addClass("zoomed"); // To maintain any other CSS states, though transform is inline now

        var owl = $carousel.data('owl.carousel');
        if (owl && owl.settings) {
          owl.settings.touchDrag = false;
          owl.settings.mouseDrag = false;
          owl.settings.pullDrag = false;
        }
      }

      function enableTapZoom() {
        var lastTapTime = 0;
        var lastTapX = 0;
        var lastTapY = 0;
        var doubleTapDelay = 320;
        var maxTapMove = 12;
        var maxDoubleTapDistance = 40;
        
        var touchStartX = 0;
        var touchStartY = 0;
        var touchMoved = false;
        var multiTouch = false;

        var isPanning = false;
        var panStartX = 0;
        var panStartY = 0;
        var currentTx = 0;
        var currentTy = 0;

        var imgs = $carousel.find(".owl-item img");

        imgs.on("touchstart", function(e) {
          var oe = e.originalEvent;
          var $img = $(this);
          
          var isNativeZoom = window.visualViewport && window.visualViewport.scale > 1.01;

          if (($carousel.hasClass("is-zoomed") && $img.attr("data-zoomed") === "true") || isNativeZoom) {
            e.stopPropagation();
            if (!isNativeZoom && oe.touches && oe.touches.length === 1) {
              isPanning = true;
              panStartX = oe.touches[0].clientX;
              panStartY = oe.touches[0].clientY;
              currentTx = parseFloat($img.attr("data-tx") || 0);
              currentTy = parseFloat($img.attr("data-ty") || 0);
            }
          }

          if (!oe.touches || oe.touches.length !== 1) {
            multiTouch = true;
            return;
          }
          multiTouch = false;
          touchMoved = false;
          touchStartX = oe.touches[0].clientX;
          touchStartY = oe.touches[0].clientY;
        });

        imgs.on("touchmove", function(e) {
          var oe = e.originalEvent;
          var $img = $(this);
          var isNativeZoom = window.visualViewport && window.visualViewport.scale > 1.01;

          if (($carousel.hasClass("is-zoomed") && $img.attr("data-zoomed") === "true") || isNativeZoom) {
            e.stopPropagation();
            if (!isNativeZoom && isPanning && oe.touches.length === 1) {
              var dxPan = oe.touches[0].clientX - panStartX;
              var dyPan = oe.touches[0].clientY - panStartY;
              var newTx = currentTx + dxPan;
              var newTy = currentTy + dyPan;
              
              var scale = parseFloat($img.attr("data-scale") || 2);
              $img.css("transform", "scale(" + scale + ") translate(" + (newTx/scale) + "px, " + (newTy/scale) + "px)");
              $img.attr("data-tx-live", newTx);
              $img.attr("data-ty-live", newTy);
            }
          }

          if (!oe.touches || oe.touches.length !== 1 || multiTouch) {
            touchMoved = true;
            return;
          }

          var dx = Math.abs(oe.touches[0].clientX - touchStartX);
          var dy = Math.abs(oe.touches[0].clientY - touchStartY);
          if (dx > maxTapMove || dy > maxTapMove) {
            touchMoved = true;
          }
        });

        imgs.on("touchend", function(e) {
          var oe = e.originalEvent;
          var $img = $(this);
          var isNativeZoom = window.visualViewport && window.visualViewport.scale > 1.01;
          
          if (($carousel.hasClass("is-zoomed") && $img.attr("data-zoomed") === "true") || isNativeZoom) {
            e.stopPropagation();
            if (!isNativeZoom && isPanning) {
              $img.attr("data-tx", $img.attr("data-tx-live") || currentTx);
              $img.attr("data-ty", $img.attr("data-ty-live") || currentTy);
              isPanning = false;
            }
          }

          var touch = oe.changedTouches && oe.changedTouches[0];
          if (!touch || multiTouch || touchMoved) {
            return;
          }

          var now = new Date().getTime();
          var delta = now - lastTapTime;
          var dxTap = Math.abs(touch.clientX - lastTapX);
          var dyTap = Math.abs(touch.clientY - lastTapY);

          if (!isNativeZoom) {
            if (delta > 0 && delta < doubleTapDelay && dxTap < maxDoubleTapDistance && dyTap < maxDoubleTapDistance) {
              toggleImageZoom(this, touch.clientX, touch.clientY);
              e.preventDefault();
            }
          }

          lastTapTime = now;
          lastTapX = touch.clientX;
          lastTapY = touch.clientY;
        });

        imgs.on("dblclick", function(e) {
          toggleImageZoom(this, e.clientX, e.clientY);
          if ($carousel.hasClass("is-zoomed")) {
            e.stopPropagation();
          }
          e.preventDefault();
        });

        $carousel.on("changed.owl.carousel", function() {
          resetZoom();
        });
      }

      function next() {
        count++;
        if (count === total) {
          for (var i = 0; i < total; i++) {
            if (validImages[i]) {
              $carousel.append('<div><img src="' + validImages[i] + '"/></div>');
            }
          }

          if ($carousel.children().length > 0) {
            $carousel.owlCarousel({
              items:1,
              loop:true,
              dots:true,
              touchDrag:true,
              pullDrag:true
            });
            enableTapZoom();
          }
        }
      }

      for (var i = 0; i < total; i++) {
        checkImage(papers[i], i);
      }
    });
  </script> 

  <style>
    body {
      background-color: black;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .wrapper {
      width: 100%;
    }
    .owl-carousel,
    .owl-carousel .owl-stage-outer,
    .owl-carousel .owl-stage,
    .owl-carousel .owl-item,
    .owl-carousel .owl-item img {
      touch-action: pinch-zoom !important;
    }
    .owl-carousel .owl-item {
      overflow: hidden;
    }
    .owl-carousel.is-zoomed .owl-stage-outer,
    .owl-carousel.is-zoomed .owl-item {
      overflow: visible !important;
    }
    .owl-carousel .owl-item img {
      width: 100%;
      height: auto;
      display: block;
      transform-origin: center center;
      transition: transform 0.2s ease;
    }
    .owl-carousel .owl-item img.zoomed {
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="owl-carousel">
      <div><img id="l_equip" src=""/></div>
      <div><img id="parisien" src=""/></div>
      <div><img id="liberation" src=""/></div>
      <div><img id="lemonde" src=""/></div>
      <div><img id="lefigaro" src=""/></div>
      <div><img id="echos" src=""/></div>
    </div>
  </div>

</body>
</html>
